<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:;">
<title>ImunoMap — Harta Sistemului Imun</title>
<link rel="stylesheet" href="styles/main.css">
<!-- External libraries (CDN fallback) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape-cose-bilkent/4.1.0/cytoscape-cose-bilkent.min.js"></script>
</head>
<body>

<div id="app">

  <!-- ========== BARA LATERALĂ ========== -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-mark">🧬</div>
      <div class="logo-text">
        <div class="brand">ImunoMap</div>
        <div class="tagline">Harta sistemului imun</div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-view="map">
        <span class="icon">🗺</span><span>Harta imună</span>
        <span class="kbd">⌘1</span>
      </button>
      <button class="nav-item" data-view="genetics">
        <span class="icon">🧬</span><span>Genetică</span>
        <span class="kbd">⌘2</span>
      </button>
      <button class="nav-item" data-view="biochemistry">
        <span class="icon">⚗</span><span>Biochimie</span>
        <span class="kbd">⌘3</span>
      </button>
      <button class="nav-item" data-view="techniques">
        <span class="icon">🔬</span><span>Tehnici</span>
        <span class="kbd">⌘4</span>
      </button>
      <button class="nav-item" data-view="ide">
        <span class="icon">💻</span><span>ImmunoScript IDE</span>
        <span class="kbd">⌘5</span>
      </button>
      <button class="nav-item" data-view="simulator">
        <span class="icon">▶</span><span>Simulator</span>
        <span class="kbd">⌘6</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="footer-title">ImunoMap 1.0</div>
      <div class="footer-sub">Date: Janeway 9e · Cianga 2008</div>
    </div>
  </aside>

  <!-- ========== CONȚINUTUL PRINCIPAL ========== -->
  <main id="main">

    <!-- Topbar -->
    <header id="topbar">
      <div class="breadcrumb">
        <span class="bc-root">ImunoMap</span>
        <span class="bc-sep">›</span>
        <span class="bc-current" id="bc-current">Harta imună</span>
      </div>
      <div class="topbar-actions">
        <input type="search" id="global-search" placeholder="Caută celulă, moleculă, tehnică…" />
        <button id="btn-help" class="btn-ghost" title="Ajutor (F1)">?</button>
      </div>
    </header>

    <!-- Conținutul viewului -->
    <section id="view-container">
      <!-- VIEW: HARTA (network) -->
      <div class="view" id="view-map">
        <div class="map-toolbar">
          <label class="filter-chip"><input type="checkbox" data-filter="cell" checked>Celule</label>
          <label class="filter-chip"><input type="checkbox" data-filter="cytokine" checked>Citokine</label>
          <label class="filter-chip"><input type="checkbox" data-filter="antibody" checked>Anticorpi</label>
          <label class="filter-chip"><input type="checkbox" data-filter="mhc" checked>MHC</label>
          <span class="sep"></span>
          <select id="layout-select">
            <option value="cose-bilkent">Layout: cose-bilkent (optim)</option>
            <option value="concentric">Layout: concentric</option>
            <option value="grid">Layout: grilă</option>
            <option value="circle">Layout: cerc</option>
            <option value="breadthfirst">Layout: BFS</option>
          </select>
          <button id="btn-fit" class="btn-ghost">Potrivește</button>
          <button id="btn-reset" class="btn-ghost">Reset</button>
        </div>
        <div id="cy-container"></div>
      </div>

      <!-- VIEW: GENETICĂ -->
      <div class="view hidden" id="view-genetics"></div>

      <!-- VIEW: BIOCHIMIE -->
      <div class="view hidden" id="view-biochemistry"></div>

      <!-- VIEW: TEHNICI -->
      <div class="view hidden" id="view-techniques"></div>

      <!-- VIEW: IDE -->
      <div class="view hidden" id="view-ide">
        <div class="ide-toolbar">
          <button id="btn-run" class="btn-primary">▶ Rulează (⌘R)</button>
          <button id="btn-clear" class="btn-ghost">Curăță consola</button>
          <button id="btn-example" class="btn-ghost">Încarcă exemplu</button>
          <button id="btn-save" class="btn-ghost">Salvează…</button>
          <span class="sep"></span>
          <span class="status-text">ImmunoScript 1.0</span>
        </div>
        <div class="ide-split">
          <textarea id="code-editor" spellcheck="false" autocomplete="off"># Scrie cod ImmunoScript aici — apasă ▶ Rulează
print("Bun venit în ImunoMap!")

# Explorează obiectele încorporate
describe(IL-2)
describe(TCD4)

# Diferențiere
let my_Th1 = differentiate(TCD4, { with: [IL-12, IFN_gamma] })
my_Th1 | describe

# Simulare răspuns imun
simulate_response("SARS-CoV-2", 10)
</textarea>
          <div id="ide-console"></div>
        </div>
      </div>

      <!-- VIEW: SIMULATOR -->
      <div class="view hidden" id="view-simulator"></div>
    </section>

    <!-- Panou de detalii (drawer din dreapta) -->
    <aside id="detail-panel" class="hidden">
      <div class="detail-header">
        <h3 id="detail-title">—</h3>
        <button id="detail-close" class="btn-ghost">×</button>
      </div>
      <div id="detail-body"></div>
    </aside>

  </main>
</div>

<!-- Scripturi — module ES -->
<script type="module" src="js/app.js"></script>
</body>
</html>
